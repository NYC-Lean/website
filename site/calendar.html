  <header class="site-header" id="nav">

      <a class="brand" href="/">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">NYC Lean</span>
      </a>
      <nav class="site-nav" id="site-nav">
        <a class="nav-home" href="/">Home</a>

      <button class="nav-toggle" type="button" aria-label="Toggle menu" aria-expanded="false" aria-controls="site-nav">

  <main>
    <section class="page-head">
      <h1 class="page-title" data-anim>Calendar</h1>
      <div class="page-rule"></div>
      <p class="page-sub" data-anim>Where and when we meet. The soonest, most accurate details always land in
        <a href="https://leanprover.zulipchat.com/#narrow/channel/224796-Geographic-locality/topic/New.20York.20City.2C.20USA" target="_blank" rel="noopener">the chat</a>
        first, then here.</p>
    </section>

    <!-- Events come from assets/events.js (shared with the home page).
         Upcoming first; past events move down automatically by date. -->
    <section class="section cal-body">
      <div class="cal-group">
        <div class="sec-head"><span class="tag">Upcoming</span><span class="rule" data-rule></span></div>
        <div class="ledger events" id="calendar-upcoming"></div>
      </div>
      <div class="cal-group" id="past-group" hidden>
        <div class="sec-head"><span class="tag">Past</span><span class="rule" data-rule></span></div>
        <div class="ledger events past" id="calendar-past"></div>
      </div>
    </section>
  </main>
